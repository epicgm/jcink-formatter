  <!-- ── Navbar ──────────────────────────────────────────────── -->
  <nav class="navbar">
    <span class="nav-logo">inkform</span>
    <div class="nav-actions">
      <span id="nav-username" class="nav-username"></span>
      <a href="manage.html"  class="btn-ghost">Characters</a>
      <a href="library.html" class="btn-ghost">Library</a>
      <a href="admin.html"   class="btn-ghost" id="admin-link" hidden>Admin</a>
      <button id="theme-toggle" class="btn-ghost" aria-label="Toggle dark mode">
        <span class="theme-toggle-icon">☽</span>
      </button>
      <button id="logout-btn" class="btn-ghost">Sign Out</button>
    </div>
  </nav>

  <!-- ── Formatter layout ──────────────────────────────────── -->
  <div class="formatter-layout">

    <!-- LEFT: selectors + raw input -->
    <div class="formatter-left">

      <div class="field">
        <label class="field-label">Character</label>
        <div class="card-row" id="character-card-row" role="radiogroup" aria-label="Select character">
          <!-- injected by home.js -->
        </div>
      </div>

      <div class="field" id="template-field" hidden>
        <label class="field-label">Template</label>
        <div class="card-row" id="template-card-row" role="radiogroup" aria-label="Select template">
          <!-- injected by home.js -->
        </div>
      </div>

      <div class="field formatter-input-field">
        <label class="field-label" for="raw-input">Raw Post</label>
        <textarea
          id="raw-input"
          class="textarea-input formatter-textarea"
          placeholder="Paste or type your raw post here…"
          spellcheck="true"
          autocorrect="on"
        ></textarea>
      </div>

    </div>

    <!-- RIGHT: output + rules drawer -->
    <div class="formatter-right">

      <div class="field formatter-output-field">
        <div class="formatter-output-header">
          <span class="field-label">Formatted Output</span>
          <button id="copy-btn" class="btn-copy">Copy</button>
        </div>
        <div
          id="formatted-output"
          class="output-area formatter-output-area"
          aria-live="polite"
        ><span class="output-placeholder">Formatted output appears here…</span></div>
      </div>

      <div class="rules-drawer" id="rules-drawer">
        <button class="rules-drawer-toggle" id="rules-drawer-toggle" type="button">
          <span>Edit Rules</span>
          <span class="rules-drawer-arrow">▾</span>
        </button>
        <div class="rules-drawer-body" id="rules-drawer-body" hidden>
          <p class="rules-drawer-hint">
            Quick rule overrides for the selected template.
            Full editing is in <a href="manage.html">Characters</a>.
          </p>
        </div>
      </div>

    </div>

  </div>

  <script src="config.js"></script>
  <script type="module" src="home.js"></script>
</body>
</html>
