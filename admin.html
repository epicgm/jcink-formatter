  <!-- ── Navbar ──────────────────────────────────────────────── -->
  <nav class="navbar">
    <span class="nav-logo">inkform <span class="admin-badge">Admin</span></span>
    <div class="nav-actions">
      <span id="nav-username" class="nav-username"></span>
      <a href="home.html"   class="btn-ghost">Formatter</a>
      <a href="manage.html" class="btn-ghost">Characters</a>
      <a href="library.html" class="btn-ghost">Library</a>
      <button id="theme-toggle" class="btn-ghost" aria-label="Toggle dark mode">
        <span class="theme-toggle-icon">☽</span>
      </button>
      <button id="logout-btn" class="btn-ghost">Sign Out</button>
    </div>
  </nav>

  <!-- ── Tab strip ──────────────────────────────────────────── -->
  <div class="manage-tabs" role="tablist" aria-label="Admin sections">
    <button class="tab-btn active" role="tab" data-tab="users"  aria-selected="true"  aria-controls="tab-users">Users</button>
    <button class="tab-btn"        role="tab" data-tab="review" aria-selected="false" aria-controls="tab-review">
      Review Queue
      <span id="queue-count" class="queue-badge" hidden></span>
    </button>
  </div>

  <!-- ── Tab panels ─────────────────────────────────────────── -->
  <div class="manage-content">

    <!-- Users tab -->
    <div id="tab-users" class="tab-panel" role="tabpanel">

      <!-- Create user form -->
      <section class="admin-section">
        <h2 class="section-heading">Create User</h2>
        <form id="create-user-form" class="admin-create-form">
          <div class="field">
            <label class="field-label" for="new-username">Username (used as login email)</label>
            <input type="text" id="new-username" class="input" placeholder="e.g. alice@example.com" required autocomplete="off" />
          </div>
          <div class="field">
            <label class="field-label" for="new-password">Temporary password</label>
            <input type="password" id="new-password" class="input" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password" />
          </div>
          <div class="field">
            <label class="field-label" for="new-role">Role</label>
            <select id="new-role" class="dropdown">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="admin-form-footer">
            <button type="submit" class="btn-primary" id="create-user-btn">Create User</button>
            <p id="create-user-status" class="save-status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <!-- Export all users -->
      <section class="admin-section">
        <h2 class="section-heading">Export</h2>
        <button id="export-all-btn" class="btn-secondary">Export all users (system JSON)</button>
        <p id="export-all-status" class="save-status" aria-live="polite" style="margin-top:var(--space-sm)"></p>
      </section>

      <!-- User list -->
      <section class="admin-section">
        <h2 class="section-heading">All Users</h2>
        <div class="admin-table-wrap">
          <table class="admin-table" id="user-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Created</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="user-tbody"></tbody>
          </table>
        </div>
        <p id="users-empty" class="empty-state" hidden>No users found.</p>
      </section>
    </div>

    <!-- Review Queue tab -->
    <div id="tab-review" class="tab-panel" role="tabpanel" hidden>
      <div class="manage-header">
        <h2 class="manage-title">Pending Submissions</h2>
      </div>
      <p class="manage-subtitle">Review user-submitted blocks. Approved blocks appear in the Board Library for all users.</p>

      <div id="review-list" class="review-list"></div>
      <p id="review-empty" class="empty-state" hidden>No pending submissions.</p>
    </div>

  </div>

  <!-- ── Reject note dialog ──────────────────────────────────── -->
  <dialog id="reject-dialog" class="manage-dialog">
    <h3 class="dialog-title">Reject Block</h3>
    <p id="reject-dialog-trigger" class="global-dialog-subtitle"><code class="trigger-code"></code></p>
    <form id="reject-form">
      <div class="field">
        <label class="field-label" for="reject-note">Rejection note <span class="field-hint">(optional — shown to submitter)</span></label>
        <textarea id="reject-note" class="textarea-input" rows="3" placeholder="e.g. Trigger name conflicts with existing block"></textarea>
      </div>
      <div class="dialog-footer">
        <button type="button" class="btn-secondary dialog-cancel">Cancel</button>
        <button type="submit" class="btn-primary" style="background:var(--color-danger)">Reject</button>
      </div>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script type="module" src="admin.js"></script>
